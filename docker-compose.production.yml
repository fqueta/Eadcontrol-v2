
services:
  # -----------------------------------------------------------------------------
  # Frontend Application (React/Vite)
  # -----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_TENANT_API_URL=${VITE_TENANT_API_URL}
        - VITE_RECAPTCHA_SITE_KEY=${VITE_RECAPTCHA_SITE_KEY}
    ports:
      - "8082:80"  # Exposto temporariamente até NPM funcionar
    environment:
      - VITE_TENANT_API_URL=${VITE_TENANT_API_URL}
      - VITE_RECAPTCHA_SITE_KEY=${VITE_RECAPTCHA_SITE_KEY}
    networks:
      - app_network
      - global_network
    restart: always
    ulimits:
      nofile:
        soft: 100000
        hard: 100000

  # -----------------------------------------------------------------------------
  # Backend Application (Laravel Octane)
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: eadcontrol-backend:latest
    container_name: octane_app
    expose:
      - "8000"
    environment:
      APP_NAME: "${APP_NAME:-EadControl}"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: stderr
      APP_BASE_PATH: /var/www/html
      
      # Database - usando mysql_prod centralizado
      DB_CONNECTION: mysql
      DB_HOST: mysql_prod
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # Redis - usando redis_prod centralizado
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis_prod
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_PERSISTENT: ${REDIS_PERSISTENT:-true}
      
      # Email
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}

      # Brevo API
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_API_URL: ${BREVO_API_URL:-https://api.brevo.com/v3}
      
      # Octane
      OCTANE_SERVER: roadrunner
      OCTANE_WORKERS: 32
      
      # Filesystem
      FILESYSTEM_DISK: public
      FRONTEND_URL: ${FRONTEND_URL}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      
      # EvolutionAPI
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
    volumes:
      - storage_data:/var/www/html/storage
    networks:
      - app_network
      - global_network
      - banco-prod_default
    restart: always
    ulimits:
      nofile:
        soft: 100000
        hard: 100000

  # -----------------------------------------------------------------------------
  # phpMyAdmin (Database Management)
  # -----------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: app_pma
    environment:
      PMA_HOST: mysql_prod
      PMA_PORT: 3306
      UPLOAD_LIMIT: 300M
    ports:
      - "8081:80"
    networks:
      - banco-prod_default
    restart: always

  # -----------------------------------------------------------------------------
  # Queue Worker (Laravel Queue)
  # -----------------------------------------------------------------------------
  queue:
    image: eadcontrol-backend:latest
    container_name: octane_queue
    command: php artisan queue:work --tries=3
    environment:
      APP_NAME: "${APP_NAME:-EadControl}"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: stderr
      APP_BASE_PATH: /var/www/html
      
      # Database - usando mysql_prod centralizado
      DB_CONNECTION: mysql
      DB_HOST: mysql_prod
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # Redis - usando redis_prod centralizado
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis_prod
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_PERSISTENT: ${REDIS_PERSISTENT:-true}
      
      # Octane
      OCTANE_SERVER: roadrunner
      
      # Filesystem
      FILES_STORAGE_PATH: /var/www/html/storage
      FILESYSTEM_DISK: public
      
      # Email
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      
      # Brevo API
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_API_URL: ${BREVO_API_URL:-https://api.brevo.com/v3}
      
      # EvolutionAPI
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
    volumes:
      - storage_data:/var/www/html/storage
    networks:
      - app_network
      - global_network
      - banco-prod_default
    restart: always

# -----------------------------------------------------------------------------
# Networks & Volumes
# -----------------------------------------------------------------------------
networks:
  app_network:
    driver: bridge
  global_network:
    external: true
  banco-prod_default:
    external: true

volumes:
  storage_data:
