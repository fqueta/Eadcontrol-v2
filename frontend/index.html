<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      pt-BR: Preconnect para provedores de vídeo (YouTube/Vimeo) para acelerar requisições iniciais.
      en-US: Preconnect to video providers (YouTube/Vimeo) to speed up initial requests.
    -->
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="preconnect" href="https://player.vimeo.com" />
    <!-- Favicon default (substituído dinamicamente se houver em localStorage) -->
    <link id="app-favicon" rel="icon" type="image/png" href="/logo.png" />
    <title id="app-title">Incluireeducar - Controle de EAD</title>
    <meta id="app-description" name="description" content="Plataforma de controle de ead" />
    <meta name="author" content="Fernando" />

    <meta property="og:title" content="Incluireeducar - Controle de EAD" />
    <meta property="og:description" content="Plataforma de controle de ead" />
    <meta property="og:type" content="website" />
    <meta id="app-og-image" property="og:image" content="https://api-educar.eadcontrol.com.br/tenancy/assets/file-storage/ExO8vhdToezIjc9ImVHx7tJyAYI65BZ5V6sVW2Mu.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Fernando_dev" />
    <meta id="app-twitter-image" name="twitter:image" content="https://api-educar.eadcontrol.com.br/tenancy/assets/file-storage/ExO8vhdToezIjc9ImVHx7tJyAYI65BZ5V6sVW2Mu.png" />
    
    <!-- Preconnect para Google reCAPTCHA para reduzir latência no primeiro carregamento -->
    <link rel="preconnect" href="https://www.google.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.google.com" />
    <link rel="dns-prefetch" href="https://www.gstatic.com" />
    <meta name="theme-color" content="#0ea5e9" />

    <!--
      pt-BR: Script para aplicar logo, favicon e imagem social com base em valores persistidos
            (localStorage) e variáveis globais (window.__APP_*__).
      en-US: Script to apply logo, favicon and social image based on persisted
            localStorage and global variables (window.__APP_*__).
    -->
    <script>
      /**
       * hexToHsl
       * pt-BR: Converte cor hex para HSL compatível com variáveis Tailwind/CSS.
       */
      function hexToHsl(hex, lightnessAdjust) {
        lightnessAdjust = lightnessAdjust || 0;
        hex = hex.replace('#', '');
        var r = parseInt(hex.substr(0, 2), 16) / 255;
        var g = parseInt(hex.substr(2, 2), 16) / 255;
        var b = parseInt(hex.substr(4, 2), 16) / 255;
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var l = (max + min) / 2;
        var h = 0, s = 0;
        if (max !== min) {
          var d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
          }
          h /= 6;
        }
        var hDeg = Math.round(h * 360);
        var sPercent = Math.round(s * 100);
        var lPercent = Math.round(l * 100) + lightnessAdjust;
        if (lPercent < 0) lPercent = 0;
        if (lPercent > 100) lPercent = 100;
        return hDeg + ' ' + sPercent + '% ' + lPercent + '%';
      }

      /**
       * applyBrandingFromPersistedSources
       * pt-BR: Lê localStorage e, em fallback, variáveis globais; aplica favicon e imagens sociais.
       *        Também expõe valores em window.__APP_*__ para uso por componentes React.
       * en-US: Reads localStorage and, as fallback, global variables; applies favicon and social images.
       *        Also exposes values to window.__APP_*__ for React components to consume.
       */
      function updateBranding() {
        try {
          var win = window;
          // Função auxiliar para forçar HTTPS caso a página esteja em HTTPS
          var ensureHttps = function(url) {
            if (url && window.location.protocol === 'https:' && url.indexOf('http://') === 0) {
              return url.replace('http://', 'https://');
            }
            return url;
          };

          var logo = ensureHttps(localStorage.getItem('app_logo_url')) || '';
          var favicon = ensureHttps(localStorage.getItem('app_favicon_url')) || logo || '';
          var social = ensureHttps(localStorage.getItem('app_social_image_url')) || '';
          var instName = (localStorage.getItem('app_institution_name') || localStorage.getItem('site_name') || localStorage.getItem('app_name') || '');
          var slogan = localStorage.getItem('app_institution_slogan') || '';
          var descr = localStorage.getItem('app_institution_description') || '';

          // Fallback para variáveis globais se localStorage estiver vazio
          if (!logo && typeof win.__APP_LOGO_URL__ === 'string') logo = ensureHttps(win.__APP_LOGO_URL__);
          if (!favicon && typeof win.__APP_FAVICON_URL__ === 'string') favicon = ensureHttps(win.__APP_FAVICON_URL__);
          if (!social && typeof win.__APP_SOCIAL_IMAGE_URL__ === 'string') social = ensureHttps(win.__APP_SOCIAL_IMAGE_URL__);
          if (!instName) {
            if (typeof win.__APP_INSTITUTION_NAME__ === 'string') instName = win.__APP_INSTITUTION_NAME__;
            else if (typeof win.__APP_SITE_NAME__ === 'string') instName = win.__APP_SITE_NAME__;
            else if (typeof win.__APP_APP_NAME__ === 'string') instName = win.__APP_APP_NAME__;
          }
          if (!slogan && typeof win.__APP_INSTITUTION_SLOGAN__ === 'string') slogan = win.__APP_INSTITUTION_SLOGAN__;
          if (!descr && typeof win.__APP_INSTITUTION_DESCRIPTION__ === 'string') descr = win.__APP_INSTITUTION_DESCRIPTION__;

          // Favicon
          if (favicon) {
            var oldLink = document.getElementById('app-favicon');
            var type = 'image/png';
            if (/\.svg$/i.test(favicon)) type = 'image/svg+xml';
            else if (/\.ico$/i.test(favicon)) type = 'image/x-icon';
            else if (/\.jpe?g$/i.test(favicon)) type = 'image/jpeg';
            else if (/\.webp$/i.test(favicon)) type = 'image/webp';
            
            var newLink = document.createElement('link');
            newLink.id = 'app-favicon';
            newLink.rel = 'shortcut icon';
            newLink.type = type;
            newLink.href = favicon + (favicon.indexOf('?') === -1 ? '?' : '&') + 't=' + new Date().getTime();
            
            if (oldLink) {
              oldLink.parentNode.removeChild(oldLink);
            }
            document.head.appendChild(newLink);
            
            // Disponibiliza para consumidores globais
            win.__APP_FAVICON_URL__ = favicon;
          }

          // OpenGraph / Twitter
          if (social) {
            var ogEl = document.getElementById('app-og-image');
            var twEl = document.getElementById('app-twitter-image');
            if (ogEl) ogEl.setAttribute('content', social);
            if (twEl) twEl.setAttribute('content', social);
            win.__APP_SOCIAL_IMAGE_URL__ = social;
          }

          // Logo: expõe globalmente para componentes que não usam localStorage diretamente
          if (logo) {
            win.__APP_LOGO_URL__ = logo;
          }

          // Title & Description (SEO / Metatags)
          var resolvedTitle = instName ? (slogan ? (instName + ' — ' + slogan) : instName) : null;
          if (resolvedTitle) {
            document.title = resolvedTitle;
            var titleEl = document.getElementById('app-title');
            if (titleEl) titleEl.textContent = resolvedTitle;
            var ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.setAttribute('content', resolvedTitle);
          }
          if (descr) {
            var descEl = document.getElementById('app-description') || document.querySelector('meta[name="description"]');
            if (descEl) descEl.setAttribute('content', descr);
            var ogDesc = document.querySelector('meta[property="og:description"]');
            if (ogDesc) ogDesc.setAttribute('content', descr);
          }

          // Dynamic PWA manifest & browser theme-color
          var primaryColor = '#0ea5e9';
          var secondaryColor = '';
          var hoverColor = '';
          var gradientTo = '';
          var isDark = false;
          var layoutStyle = 'rounded';

          try {
            var appearanceRaw = localStorage.getItem('appearanceSettings');
            if (appearanceRaw) {
              var settings = JSON.parse(appearanceRaw);
              if (settings) {
                if (settings.primaryColor) primaryColor = settings.primaryColor;
                if (settings.secondaryColor) secondaryColor = settings.secondaryColor;
                if (settings.hoverColor) hoverColor = settings.hoverColor;
                if (settings.gradientToColor) gradientTo = settings.gradientToColor;
                if (settings.darkMode) isDark = !!settings.darkMode;
                if (settings.layoutStyle) layoutStyle = settings.layoutStyle;
              }
            }
          } catch(e) {}

          var root = document.documentElement;
          if (primaryColor) {
            root.style.setProperty('--primary', hexToHsl(primaryColor));
            root.style.setProperty('--primary-hover', hexToHsl(hoverColor || primaryColor, hoverColor ? 0 : -10));
          }
          if (secondaryColor) {
            root.style.setProperty('--secondary', hexToHsl(secondaryColor));
            root.style.setProperty('--secondary-hover', hexToHsl(secondaryColor, -10));
          }
          if (gradientTo) {
            root.style.setProperty('--gradient-to', gradientTo);
          }
          if (layoutStyle === 'squared') {
            root.classList.add('layout-squared');
            root.classList.remove('layout-rounded');
            root.style.setProperty('--radius', '0px');
          } else {
            root.classList.add('layout-rounded');
            root.classList.remove('layout-squared');
            root.style.setProperty('--radius', '0.3rem');
          }

          if (isDark) {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }

          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) {
            themeMeta.setAttribute('content', primaryColor);
          }

          var manifestEl = document.querySelector('link[rel="manifest"]');
          if (!manifestEl) {
            manifestEl = document.createElement('link');
            manifestEl.setAttribute('rel', 'manifest');
            document.head.appendChild(manifestEl);
          }

          var pwaIcon = favicon || logo || '/logo.png';
          var pwaIconType = 'image/png';
          if (pwaIcon) {
            if (/\.svg$/i.test(pwaIcon)) pwaIconType = 'image/svg+xml';
            else if (/\.webp$/i.test(pwaIcon)) pwaIconType = 'image/webp';
            else if (/\.jpe?g$/i.test(pwaIcon)) pwaIconType = 'image/jpeg';
            else if (/\.ico$/i.test(pwaIcon)) pwaIconType = 'image/x-icon';
          }

          var manifestObj = {
            name: instName || 'Ead Control',
            short_name: instName || 'Ead Control',
            description: descr || 'Plataforma de controle de EAD',
            lang: 'pt-BR',
            theme_color: primaryColor,
            background_color: '#ffffff',
            display: 'standalone',
            start_url: '/',
            icons: [
              {
                src: pwaIcon,
                sizes: '192x192',
                type: pwaIconType,
                purpose: 'any maskable'
              },
              {
                src: pwaIcon,
                sizes: '512x512',
                type: pwaIconType
              }
            ]
          };

          try {
            var blob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
            var manifestURL = URL.createObjectURL(blob);
            if (win.__APP_MANIFEST_BLOB_URL__) {
              URL.revokeObjectURL(win.__APP_MANIFEST_BLOB_URL__);
            }
            win.__APP_MANIFEST_BLOB_URL__ = manifestURL;
            manifestEl.setAttribute('href', manifestURL);
          } catch (e) {
            console.warn('PWA Manifest dynamic update failed:', e);
          }
        } catch (e) {
          console.warn('Branding load failed:', e);
        }
      }

      // Executa imediatamente
      updateBranding();

      // Registra listeners para sincronização dinâmica
      window.addEventListener('storage', updateBranding);
      window.addEventListener('branding:updated', updateBranding);

      // Prefetch de branding em background
      try {
        var host = window.location.host.replace(/^www\./i, '');
        var protocol = window.location.protocol;
        var parts = window.location.hostname.replace(/^www\./i, '').split('.');
        var tenantId = parts.length > 1 ? parts[0] : 'default';
        var apiUrl = '';

        if (/localhost|127\.0\.0\.1/.test(host)) {
          apiUrl = 'http://api-' + tenantId + '.localhost:8002/api/v1';
        } else {
          var isPlatformDomain = /(?:^|\.)(?:eadcontrol|eadcrontro|incluireeducar)\.com\.br$/i.test(host);
          apiUrl = isPlatformDomain ? (protocol + '//api-' + host + '/api/v1') : (protocol + '//' + host + '/api/v1');
        }

        var publicBrandingUrl = apiUrl + '/public/options/branding';

        fetch(publicBrandingUrl, { cache: 'no-store' })
          .then(function(res) {
            if (res.ok) return res.json();
          })
          .then(function(json) {
            var dataObj = json && json.data;
            if (dataObj && typeof dataObj === 'object') {
              var keysMap = {
                app_logo_url: 'app_logo_url',
                app_footer_logo_url: 'app_footer_logo_url',
                app_favicon_url: 'app_favicon_url',
                app_social_image_url: 'app_social_image_url',
                app_institution_name: 'app_institution_name',
                app_institution_slogan: 'app_institution_slogan',
                app_institution_description: 'app_institution_description',
                app_institution_url: 'app_institution_url',
                app_whatsapp: 'app_whatsapp',
                app_theme: 'app_theme',
                app_font_family: 'app_font_family',
                home_hero_title: 'home_hero_title',
                home_hero_image_url: 'home_hero_image_url'
              };
              for (var k in keysMap) {
                if (dataObj[k] !== undefined) {
                  var valStr = String(dataObj[k]).trim();
                  if (valStr && window.location.protocol === 'https:' && valStr.indexOf('http://') === 0) {
                    valStr = valStr.replace('http://', 'https://');
                  }
                  localStorage.setItem(keysMap[k], valStr);
                }
              }

              try {
                var primary = String(dataObj['app_primary_color'] || '').trim();
                var primaryText = String(dataObj['app_primary_text_color'] || '').trim();
                var secondary = String(dataObj['app_secondary_color'] || '').trim();
                var secondaryText = String(dataObj['app_secondary_text_color'] || '').trim();
                var hover = String(dataObj['app_hover_color'] || '').trim();
                var gradientTo = String(dataObj['app_gradient_to_color'] || '').trim();
                var layoutStyle = String(dataObj['app_layout_style'] || '').trim();
                var headerTransparent = dataObj['app_header_transparent'] === true || dataObj['app_header_transparent'] === 'true';

                var stored = localStorage.getItem('appearanceSettings');
                var settings = stored ? JSON.parse(stored) : {};
                if (primary) settings.primaryColor = primary;
                if (primaryText) settings.primaryTextColor = primaryText;
                if (secondary) settings.secondaryColor = secondary;
                if (secondaryText) settings.secondaryTextColor = secondaryText;
                if (hover) settings.hoverColor = hover;
                if (gradientTo) settings.gradientToColor = gradientTo;
                if (layoutStyle) settings.layoutStyle = layoutStyle;
                settings.headerTransparent = headerTransparent;

                localStorage.setItem('appearanceSettings', JSON.stringify(settings));
              } catch(e) {}

              updateBranding();
              window.dispatchEvent(new Event('branding:updated'));
            }
          })
          .catch(function(err) {
            console.warn('Silent branding prefetch failed:', err);
          });
      } catch (e) {}
    </script>
  </head>

  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #ffffff; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
        <div style="width: 48px; height: 48px; border: 4px solid hsl(var(--primary) / 0.1); border-left-color: hsl(var(--primary)); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
          /* Dark mode support for preload page */
          .dark body, .dark #root > div {
            background-color: #020617 !important;
          }
        </style>
      </div>
    </div>
    <!--
      pt-BR: Desregistra Service Workers antigos e limpa caches antes de carregar o app.
            Isso previne o erro "dispatcher is null" causado por SW antigo servindo
            bundles JS incompatíveis com o HMR do Vite em desenvolvimento.
      en-US: Unregisters old Service Workers and clears caches before loading the app.
            This prevents the "dispatcher is null" error caused by old SW serving
            stale JS bundles incompatible with Vite's HMR in development.
    -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var i = 0; i < regs.length; i++) {
            regs[i].unregister();
          }
        });
        if (caches) {
          caches.keys().then(function(names) {
            for (var i = 0; i < names.length; i++) {
              caches.delete(names[i]);
            }
          });
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
