server {
    listen 80;
    
    # Enable gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Detect crawler bots
        set $is_bot 0;
        if ($http_user_agent ~* (facebookexternalhit|twitterbot|whatsapp|telegram|slackbot|discordbot|googlebot|bingbot|baiduspider|yandex)) {
            set $is_bot 1;
        }

        # Do not route static assets (JS, CSS, images, etc.) to the backend crawler endpoint
        if ($uri ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|json|txt|xml|mp4|webm|mp3)$) {
            set $is_bot 0;
        }

        # If it is a crawler bot, proxy the request to the Laravel backend
        if ($is_bot = 1) {
            # Rewrite URI to point to the backend's public crawler-preview endpoint
            rewrite ^(.*)$ /api/v1/public/crawler-preview?url=$scheme://$host$request_uri break;
            
            # Forward headers to preserve host and tenant domain mapping
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_pass http://backend:8000;
        }

        try_files $uri $uri/ /index.html;
    }
}
