# HTTP -> HTTPS (cursos.incluireeducar.com.br + api-cursos)
server {
    listen 80;
    server_name cursos.incluireeducar.com.br api-cursos.incluireeducar.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP -> HTTPS (hairacademyrj.eadcontrol.com.br + api-)
server {
    listen 80;
    server_name hairacademyrj.eadcontrol.com.br api-hairacademyrj.eadcontrol.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend - cursos.incluireeducar.com.br
server {
    listen 443 ssl;
    http2 on;
    server_name cursos.incluireeducar.com.br;

    ssl_certificate /etc/letsencrypt/live/cursos.incluireeducar.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.incluireeducar.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    client_max_body_size 100M;

    location / {
        proxy_pass http://frontend:80;
    }

    location ~* (sw\.js|manifest\.webmanifest|index\.html)$ {
        proxy_pass http://frontend:80;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location /assets/ {
        proxy_pass http://frontend:80;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot|mp4|webm)$ {
        proxy_pass http://frontend:80;
        add_header Cache-Control "public, max-age=86400";
    }
}

# Backend API - api-cursos.incluireeducar.com.br
server {
    listen 443 ssl;
    http2 on;
    server_name api-cursos.incluireeducar.com.br;

    ssl_certificate /etc/letsencrypt/live/cursos.incluireeducar.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.incluireeducar.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    client_max_body_size 100M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://octane_app:8000;
    }
}

